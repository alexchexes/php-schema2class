$schema: "http://json-schema.org/draft-07/schema#"
title: "Definitions filter fixture"
type: object
properties:
  rootValue:
    type: string
  inlineObject:
    type: object
    properties:
      inlineValue:
        type: integer
    required: [inlineValue]
definitions:
  Primary:
    type: object
    properties:
      dep:
        $ref: "#/definitions/Dependency"
      helper:
        $ref: "#/$defs/SupportChain"
      inlineObject:
        type: object
        properties:
          label:
            type: string
    required: [dep, helper]
  Dependency:
    type: object
    properties:
      leaf:
        $ref: "#/definitions/Leaf"
    required: [leaf]
  Leaf:
    type: object
    properties:
      value:
        type: string
    required: [value]
  Ignored:
    type: object
    properties:
      skip:
        type: string
$defs:
  Support:
    type: object
    properties:
      detail:
        type: string
    required: [detail]
  SupportChain:
    type: object
    properties:
      support:
        $ref: "#/$defs/Support"
      extra:
        $ref: "#/definitions/Dependency"
    required: [support]
  Unwanted:
    type: object
    properties:
      drop:
        type: integer
