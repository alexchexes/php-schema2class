required:
  - files
properties:
  targetPHPVersion:
    oneOf:
      - type: integer
        enum: [5, 7, 8]
      - type: string
  files:
    type: array
    items:
      required:
        - input
        - targetDirectory
      properties:
        input:
          type: string
        className:
          type: string
        targetDirectory:
          type: string
        targetNamespace:
          type: string
  options:
    properties:
      disableStrictTypes:
        type: boolean
        default: false
      treatValuesWithDefaultAsOptional:
        type: boolean
        default: false
      inlineAllofReferences:
        type: boolean
        default: false
      targetPHPVersion:
        oneOf:
          - type: integer
            enum: [5, 7, 8]
          - type: string
        default: 8.2.0
      newValidatorClassExpr:
        type: string
        description: |
          The expression to use to create a new instance of the validator class.
          This is useful if you want to use a custom validator class.
        default: "new \\JsonSchema\\Validator()"

      preservePropertyNames:
        type: boolean
        description: |
          When true, properties names are not converted to camelCase.
        default: false

      noGetters:
        type: boolean
        description: |
          When true, no getters are created and all properties are 'public'.
        default: false

      noSetters:
        type: boolean
        description: |
          When true, no withX() / withoutX() setters/unsetters are created.
        default: false
