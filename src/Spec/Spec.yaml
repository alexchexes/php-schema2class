definitions:
  Specification:
    properties:
      options:
        $ref: '#/definitions/SpecificationOptions'
      files:
        type: array
        items:
          properties:
            input:
              oneOf:
                - type: string
                - type: array
            className:
              type: string
            options:
              $ref: '#/definitions/SpecificationOptions'
          additionalProperties: false
          required:
            - input
    additionalProperties: false
    required:
      - files

  SpecificationOptions:
    additionalProperties: false
    properties:
      targetDirectory:
        type: string
      targetNamespace:
        type: string
      cleanTargetDirectory:
        type: boolean
        description: |
          When true, the generator removes all files from the target directory
          before writing new ones.
      disableStrictTypes:
        type: boolean
      treatValuesWithDefaultAsOptional:
        type: boolean
      inlineAllofReferences:
        type: boolean
      targetPHPVersion:
        oneOf:
          - type: integer
            enum: [5, 7, 8]
          - type: string
      newValidatorClassExpr:
        type: string
        description: |
          The expression to use to create a new instance of the validator class.
          This is useful if you want to use a custom validator class.
      preservePropertyNames:
        type: boolean
        description: |
          When true, properties names are not converted to camelCase.
      noGetters:
        type: boolean
        description: |
          When true, no getters are created and all properties are 'public'.
      noSetters:
        type: boolean
        description: |
          When true, no withX() / withoutX() setters/unsetters are created.
      noDescriptionsInSchema:
        type: boolean
        description: |
          When true, the schema used for validation will not include any description fields
      singleLineSchema:
        type: boolean
        description: |
          When true, the whole schema used for validation will on a single line in the class property
      noEnums:
        type: boolean
        description: |
          Disable generating PHP enum classes even on PHP ≥ 8.1. Enum values will be
          handled like in earlier PHP versions.
